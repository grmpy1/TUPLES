<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUPLΣS Puzzle Suite</title>
    <style>
        :root {
            --bg-color: #0b110e;
            --card-bg: #111a15;
            --text-main: #f5f5f5;
            --accent: #dca338;
            --target-1: #e26142;
            --target-2: #e08b41;
            --target-3: #228f81;
            --target-4: #3a86c8;
            --target-5: #9b5de5;
            --tile-bg: #213028;
            --tile-border: #2c4237;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: var(--text-main);
            letter-spacing: 6px;
            margin-bottom: 2px;
            font-size: 2.5rem;
            font-weight: 300;     /* Keeps font lines thin */
            font-style: italic;   /* Elegant italics style */
        }
        .instructions {
            font-size: 0.75rem;
            color: #70857a;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
        }
        
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #1a2921;
        }
        .toggle-label {
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: #70857a;
            transition: color 0.2s ease;
        }
        .toggle-label.active {
            color: var(--accent);
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #213028;
            transition: .3s;
            border-radius: 24px;
            border: 1px solid var(--tile-border);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-main);
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #1a3c2b;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: var(--accent);
        }

        .targets-container {
            display: grid;
            gap: 10px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
        }
        
        .target-card {
            background: var(--card-bg);
            border: 2px solid #1a2921;
            border-radius: 12px;
            padding: 12px 2px 8px 2px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .target-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }
        .target-card[data-idx="0"]::after { background: var(--target-1); }
        .target-card[data-idx="1"]::after { background: var(--target-2); }
        .target-card[data-idx="2"]::after { background: var(--target-3); }
        .target-card[data-idx="3"]::after { background: var(--target-4); }
        .target-card[data-idx="4"]::after { background: var(--target-5); }
        
        .target-card[data-idx="0"].active { border-color: var(--target-1); box-shadow: 0 0 10px rgba(226, 97, 66, 0.3); }
        .target-card[data-idx="1"].active { border-color: var(--target-2); box-shadow: 0 0 10px rgba(224, 139, 65, 0.3); }
        .target-card[data-idx="2"].active { border-color: var(--target-3); box-shadow: 0 0 10px rgba(34, 143, 129, 0.3); }
        .target-card[data-idx="3"].active { border-color: var(--target-4); box-shadow: 0 0 10px rgba(58, 134, 200, 0.3); }
        .target-card[data-idx="4"].active { border-color: var(--target-5); box-shadow: 0 0 10px rgba(155, 93, 229, 0.3); }
        
        .target-card[data-idx="0"].solved { background: var(--target-1); color: #000; border-color: var(--target-1); }
        .target-card[data-idx="1"].solved { background: var(--target-2); color: #000; border-color: var(--target-2); }
        .target-card[data-idx="2"].solved { background: var(--target-3); color: #000; border-color: var(--target-3); }
        .target-card[data-idx="3"].solved { background: var(--target-4); color: #000; border-color: var(--target-4); }
        .target-card[data-idx="4"].solved { background: var(--target-5); color: #000; border-color: var(--target-5); }
        
        .target-val { font-size: 1.5rem; font-weight: bold; }
        .target-status { font-size: 0.7rem; margin-top: 5px; opacity: 0.8; }
        
        .grid {
            display: grid;
            gap: 15px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
        }
        
        .tile {
            width: 100%;
            padding-top: 100%;
            position: relative;
            background: var(--tile-bg);
            border: 2px solid var(--tile-border);
            border-radius: 50%;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s ease;
        }
        .tile-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.25rem;
            font-weight: bold;
        }
        .tile.sel-0 { background: var(--target-1); color: #000; border-color: var(--target-1); }
        .tile.sel-1 { background: var(--target-2); color: #000; border-color: var(--target-2); }
        .tile.sel-2 { background: var(--target-3); color: #000; border-color: var(--target-3); }
        .tile.sel-3 { background: var(--target-4); color: #000; border-color: var(--target-4); }
        .tile.sel-4 { background: var(--target-5); color: #000; border-color: var(--target-5); }
        
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            width: 100%;
            max-width: 440px;
        }
        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }
        .btn-clear {
            background: #213028;
            color: #fff;
            border: 1px solid var(--tile-border);
        }
        .status-msg {
            margin-top: 15px;
            color: #5cdba7;
            font-weight: bold;
            font-size: 1.1rem;
            height: 25px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>TUPLΣS</h1>
    <div class="instructions" id="gameInstructions">All targets require exactly 4 tiles.<br>Clear the whole board to solve.</div>

    <div class="toggle-container">
        <span class="toggle-label active" id="lbl4x4">4 x 4</span>
        <label class="switch">
            <input type="checkbox" id="gridToggle" onchange="handleModeChange()">
            <span class="slider"></span>
        </label>
        <span class="toggle-label" id="lbl5x5">5 x 5</span>
    </div>

    <!-- Speed trial clock display box -->
    <div id="timerDisplay" style="font-size: 1.5rem; font-weight: 300; color: var(--accent); margin-bottom: 20px; letter-spacing: 2px;">00:00</div>

    <div class="targets-container" id="targetsBox"></div>
    <div class="grid" id="gridBox"></div>
    <div class="status-msg" id="statusMsg"></div>
    
    <div class="btn-container">
        <!-- Arranged perfectly with Clear Board first on the left -->
        <button onclick="clearCurrentSelections()" class="btn btn-clear">Clear Board</button>
        <button id="puzzleBtn" class="btn">New Puzzle</button>
    </div>

    <canvas id="confettiCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999;"></canvas>

</body>
</html>
<script>
    let targets = [], board = [], currentTargetIdx = 0, selections = [];
    let is5x5Mode = false, requiredTileCount = 4, totalTargetsCount = 4, totalTilesCount = 16;
    let timerInterval = null, timerSeconds = 0;

    function handleModeChange() {
        is5x5Mode = document.getElementById('gridToggle').checked;
        requiredTileCount = is5x5Mode ? 5 : 4;
        totalTargetsCount = is5x5Mode ? 5 : 4;
        totalTilesCount = is5x5Mode ? 25 : 16;
        document.getElementById('lbl4x4').className = `toggle-label ${!is5x5Mode ? 'active' : ''}`;
        document.getElementById('lbl5x5').className = `toggle-label ${is5x5Mode ? 'active' : ''}`;
        document.getElementById('gameInstructions').innerHTML = `All targets require exactly ${requiredTileCount} tiles.<br>Clear the whole board to solve.`;
        initGame();
    }

    function initGame() {
        document.getElementById('statusMsg').innerText = "";
        selections = Array.from({length: totalTargetsCount}, () => []);
        currentTargetIdx = 0;
        generateDynamicMatrixPuzzle();
        renderTargets();
        renderGrid();
        startTimer();
    }

    function clearCurrentSelections() {
        document.getElementById('statusMsg').innerText = "";
        selections = Array.from({length: totalTargetsCount}, () => []);
        renderTargets();
        renderGrid();
    }

    function generateDynamicMatrixPuzzle() {
        let tBox = document.getElementById('targetsBox'), gBox = document.getElementById('gridBox');
        let cols = is5x5Mode ? 5 : 4;
        tBox.style.gridTemplateColumns = gBox.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        tBox.style.maxWidth = gBox.style.maxWidth = is5x5Mode ? "550px" : "440px";

        let pool = [];
        while (pool.length < totalTilesCount) {
            let val = Math.floor(Math.random() * (is5x5Mode ? 45 : 36)) + 4;
            if (!pool.includes(val)) pool.push(val);
        }

        let possibleTargets = [];
        for (let i = 0; i < totalTargetsCount; i++) {
            possibleTargets.push(pool.slice(i * requiredTileCount, (i + 1) * requiredTileCount).reduce((a, b) => a + b, 0));
        }

        // Shuffle arrays dynamically
        let shuff = (arr) => arr.sort(() => Math.random() - 0.5);
        board = shuff(pool);
        targets = shuff(possibleTargets);
    }

    function renderTargets() {
        let container = document.getElementById('targetsBox');
        container.innerHTML = '';
        targets.forEach((tar, idx) => {
            let sum = selections[idx].reduce((s, i) => s + board[i], 0);
            let isSolved = (sum === tar && selections[idx].length === requiredTileCount);
            let card = document.createElement('div');
            card.className = `target-card ${idx === currentTargetIdx ? 'active' : ''} ${isSolved ? 'solved' : ''}`;
            card.dataset.idx = idx;
            card.onclick = () => { currentTargetIdx = idx; renderTargets(); };
            card.innerHTML = `<div class="target-val">${tar}</div><div class="target-status">${sum} / ${tar} ${isSolved ? '✓' : ''}</div>`;
            container.appendChild(card);
        });
    }

    function renderGrid() {
        let container = document.getElementById('gridBox');
        container.innerHTML = '';
        board.forEach((val, idx) => {
            let tile = document.createElement('div');
            tile.className = 'tile';
            for(let i = 0; i < totalTargetsCount; i++) { if (selections[i].includes(idx)) tile.classList.add(`sel-${i}`); }
            tile.onclick = () => handleTileClick(idx);
            tile.innerHTML = `<span class="tile-text">${val}</span>`;
            container.appendChild(tile);
        });
    }

    function handleTileClick(tileIdx) {
        let rem = false;
        for(let i = 0; i < totalTargetsCount; i++) {
            let f = selections[i].indexOf(tileIdx);
            if (f > -1) { selections[i].splice(f, 1); rem = true; }
        }
        if (!rem) {
            if (selections[currentTargetIdx].length >= requiredTileCount) return;
            selections[currentTargetIdx].push(tileIdx);
        }
        renderTargets(); renderGrid(); checkWinState();
    }

    function checkWinState() {
        let win = true;
        for(let i = 0; i < totalTargetsCount; i++) {
            let sum = selections[i].reduce((s, j) => s + board[j], 0);
            if (sum !== targets[i] || selections[i].length !== requiredTileCount) win = false;
        }
        if (win) {
            document.getElementById('statusMsg').innerText = "SOLVED!";
            clearInterval(timerInterval); triggerConfetti();
        }
    }

    function startTimer() {
        clearInterval(timerInterval); timerSeconds = 0;
        document.getElementById("timerDisplay").innerText = "00:00";
        timerInterval = setInterval(() => {
            timerSeconds++;
            let m = Math.floor(timerSeconds / 60), s = timerSeconds % 60;
            document.getElementById("timerDisplay").innerText = `${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
        }, 1000);
    }

    function triggerConfetti() {
        let cv = document.getElementById("confettiCanvas"), ctx = cv.getContext("2d");
        cv.width = window.innerWidth; cv.height = window.innerHeight;
        let p = [], clr = ["#e26142", "#e08b41", "#228f81", "#3a86c8", "#9b5de5", "#dca338"];
        for (let i = 0; i < 100; i++) {
            p.push({ x: cv.width / 2, y: cv.height * 0.6, vx: (Math.random() - 0.5) * 14, vy: (Math.random() * -12) - 4, size: Math.random() * 6 + 4, color: clr[Math.floor(Math.random() * clr.length)], rot: Math.random() * 360, spd: (Math.random() - 0.5) * 8 });
        }
        function draw() {
            ctx.clearRect(0, 0, cv.width, cv.height); let act = false;
            p.forEach(part => {
                part.x += part.vx; part.y += part.vy; part.vy += 0.4; part.vx *= 0.98; part.rot += part.spd;
                if (part.y < cv.height) {
                    act = true; ctx.save(); ctx.translate(part.x, part.y); ctx.rotate(part.rot * Math.PI / 180);
                    ctx.fillStyle = part.color; ctx.fillRect(-part.size / 2, -part.size / 2, part.size, part.size); ctx.restore();
                }
            });
            if (act) requestAnimationFrame(draw);
        }
        draw();
    }

    document.getElementById('puzzleBtn').onclick = initGame;
    initGame();
</script>
